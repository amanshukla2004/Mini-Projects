<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Upload Interface</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .upload-wrapper { text-align: center; }

        #upload-btn {
            position: relative;
            padding: 1.25rem 3rem;
            background: var(--primary);
            color: white;
            border-radius: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        #upload-btn:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.4); }

        #upload-btn:active { transform: translateY(0); }

        .progress-overlay {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.4s ease;
        }

        #status { margin-top: 1.5rem; opacity: 0.6; font-size: 0.9rem; font-family: monospace; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="upload-wrapper">
        <label id="upload-btn">
            <span id="btn-text">Transmit Data</span>
            <div id="progress" class="progress-overlay"></div>
            <input type="file" id="file-input">
        </label>
        <div id="status">STATUS: STANDBY</div>
    </div>

    <script>
        const btn = document.getElementById('upload-btn');
        const text = document.getElementById('btn-text');
        const progress = document.getElementById('progress');
        const status = document.getElementById('status');
        const fileInput = document.getElementById('file-input');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                startUpload(e.target.files[0].name);
            }
        });

        function startUpload(filename) {
            text.innerText = "Transmitting...";
            status.innerText = `UPLOADING: ${filename.toUpperCase()}`;
            btn.style.pointerEvents = "none";
            
            let p = -100;
            const interval = setInterval(() => {
                p += 5;
                progress.style.left = `${p}%`;
                
                if (p >= 0) {
                    clearInterval(interval);
                    text.innerText = "Complete";
                    status.innerText = "STATUS: UPLOAD_SUCCESS";
                    btn.style.background = "#10b981";
                    
                    setTimeout(() => {
                        p = -100;
                        progress.style.left = "-100%";
                        text.innerText = "Transmit Data";
                        status.innerText = "STATUS: STANDBY";
                        btn.style.background = "var(--primary)";
                        btn.style.pointerEvents = "all";
                        fileInput.value = '';
                    }, 3000);
                }
            }, 100);
        }
    </script>
</body>
</html>
