<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Interactive Swarm</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #080808;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none; /* Hides cursor for immersion */
            user-select: none; /* Prevents text selection while dragging */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        
        p {
            letter-spacing: 2px;
            color: #888;
            line-height: 1.6;
        }

        .highlight { color: #00f2fe; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Flux Web</h1>
        <p>Swipe fast for <span class="highlight">Fluid Wake</span>.<br>Click to fire <span class="highlight">Energy Pulse</span>.<br>Hold & Release for <span class="highlight">Supernova</span>.</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- 1. STATE & SETTINGS ---
        const particles = [];
        const shockwaves = []; // Stores active energy pulses
        const PARTICLE_COUNT = 120; 
        const CONNECT_DISTANCE = 200; 

        // Advanced Pointer Object
        const pointer = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            prevX: canvas.width / 2,
            prevY: canvas.height / 2,
            vx: 0, // Velocity X
            vy: 0, // Velocity Y
            speed: 0,
            isDown: false,
            charge: 0 // Builds up while holding click
        };

        // --- 2. EVENT LISTENERS ---
        window.addEventListener('pointermove', (e) => {
            pointer.prevX = pointer.x;
            pointer.prevY = pointer.y;
            pointer.x = e.clientX;
            pointer.y = e.clientY;

            // Calculate mouse speed for FLUID WAKE
            pointer.vx = pointer.x - pointer.prevX;
            pointer.vy = pointer.y - pointer.prevY;
            pointer.speed = Math.sqrt(pointer.vx**2 + pointer.vy**2);

            // Apply FLUID WAKE force to nearby particles if moving fast
            if (pointer.speed > 15 && !pointer.isDown) {
                particles.forEach(p => {
                    const dx = p.x - pointer.x;
                    const dy = p.y - pointer.y;
                    const dist = Math.sqrt(dx*dx + dy*dy) + 1;
                    
                    if (dist < 150) {
                        // Push particles in the direction of the swipe
                        p.vx += (pointer.vx / dist) * 8;
                        p.vy += (pointer.vy / dist) * 8;
                    }
                });
            }
        });

        window.addEventListener('pointerdown', () => {
            pointer.isDown = true;
            pointer.charge = 0; // Reset charge

            // Fire ENERGY PULSE SHOCKWAVE
            shockwaves.push({
                x: pointer.x,
                y: pointer.y,
                radius: 0,
                maxRadius: Math.max(canvas.width, canvas.height),
                speed: 15
            });
        });

        window.addEventListener('pointerup', () => {
            pointer.isDown = false;
            
            // Trigger SUPERNOVA blast if charged
            if (pointer.charge > 1) {
                particles.forEach(p => {
                    const dx = p.x - pointer.x;
                    const dy = p.y - pointer.y;
                    const dist = Math.sqrt(dx*dx + dy*dy) + 1;
                    
                    // Explosive outward force
                    p.vx += (dx / dist) * pointer.charge * 15;
                    p.vy += (dy / dist) * pointer.charge * 15;
                });
            }
            pointer.charge = 0;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- 3. PARTICLE BLUEPRINT ---
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Momentum vectors for physics
                this.vx = 0;
                this.vy = 0; 

                this.size = Math.random() * 12 + 2; 
                this.baseColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.shapeType = Math.floor(Math.random() * 3); 
                
                this.friction = Math.random() * 0.05 + 0.01; 
                this.angle = Math.random() * Math.PI * 2;
                this.wanderSpeed = Math.random() * 0.05 + 0.001;

                this.isShocked = false; // Status for glowing
            }

            update() {
                let targetX = pointer.x;
                let targetY = pointer.y;
                let currentFriction = this.friction;

                // BLACK HOLE MECHANIC
                if (pointer.isDown) {
                    // Build up power (max 5)
                    pointer.charge = Math.min(pointer.charge + 0.05, 5); 
                    currentFriction = 0.15; // Suck in faster

                    const dx = this.x - pointer.x;
                    const dy = this.y - pointer.y;
                    const dist = Math.sqrt(dx*dx + dy*dy) + 1;

                    // Add an orbital swirl effect while pulling in
                    this.vx -= (dy / dist) * pointer.charge * 0.5;
                    this.vy += (dx / dist) * pointer.charge * 0.5;
                } else {
                    // Normal organic wandering
                    this.angle += this.wanderSpeed;
                    this.x += Math.cos(this.angle) * 2;
                    this.y += Math.sin(this.angle) * 2;
                }

                // Apply LERP (Magnetism)
                this.x += (targetX - this.x) * currentFriction;
                this.y += (targetY - this.y) * currentFriction;

                // Apply Physical Momentum (from Wake or Supernova)
                this.x += this.vx;
                this.y += this.vy;

                // Gradually slow down momentum (Air Resistance)
                this.vx *= 0.85;
                this.vy *= 0.85;
            }

            draw() {
                // If hit by shockwave, turn bright white
                ctx.fillStyle = this.isShocked ? '#ffffff' : this.baseColor;
                ctx.beginPath();

                if (this.shapeType === 0) {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                } else if (this.shapeType === 1) {
                    ctx.rect(this.x - this.size, this.y - this.size, this.size * 2, this.size * 2);
                } else {
                    ctx.moveTo(this.x, this.y - this.size);
                    ctx.lineTo(this.x + this.size, this.y + this.size);
                    ctx.lineTo(this.x - this.size, this.y + this.size);
                }
                ctx.fill();
            }
        }

        // Initialize Particles
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        // --- 4. ANIMATION LOOP ---
        function animate() {
            // Motion Blur
            ctx.fillStyle = 'rgba(8, 8, 8, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update Shockwaves
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.radius += sw.speed;

                // Draw the expanding ring
                ctx.beginPath();
                ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 242, 254, ${1 - (sw.radius / sw.maxRadius)})`;
                ctx.lineWidth = 3;
                ctx.stroke();

                if (sw.radius > sw.maxRadius) shockwaves.splice(i, 1);
            }

            // Update and Draw Particles
            for (let i = 0; i < particles.length; i++) {
                let p1 = particles[i];
                p1.isShocked = false;

                // Check if particle is touching any shockwave ring
                shockwaves.forEach(sw => {
                    const distToRing = Math.hypot(p1.x - sw.x, p1.y - sw.y);
                    // If the particle is exactly on the ring (+/- 20px)
                    if (Math.abs(distToRing - sw.radius) < 20) {
                        p1.isShocked = true;
                    }
                });

                p1.update();
                p1.draw();

                // Draw Connections
                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < CONNECT_DISTANCE) {
                        let opacity = 1 - (distance / CONNECT_DISTANCE);
                        
                        // If either particle is shocked, the connection web lights up!
                        if (p1.isShocked || p2.isShocked) {
                            ctx.strokeStyle = `rgba(0, 242, 254, ${opacity})`;
                            ctx.lineWidth = 2; // Thicker line
                        } else {
                            ctx.strokeStyle = `rgba(250, 250, 250, ${opacity * 0.15})`;
                            ctx.lineWidth = 1;
                        }

                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }

            // Draw Core Cursor Glow
            ctx.beginPath();
            ctx.arc(pointer.x, pointer.y, pointer.isDown ? 15 : 5, 0, Math.PI * 2);
            ctx.fillStyle = pointer.isDown ? '#00f2fe' : 'white';
            ctx.shadowBlur = pointer.isDown ? 50 : 20;
            ctx.shadowColor = pointer.isDown ? '#00f2fe' : 'white';
            ctx.fill();
            ctx.shadowBlur = 0;

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
