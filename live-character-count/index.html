<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural SMS Buffer</title>
    <style>
        :root {
            --primary: #fbbf24;
            --bg: #111827;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 { margin-top: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }

        textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 1rem;
            color: white;
            font-size: 1.1rem;
            resize: none;
            height: 150px;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }

        textarea:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.5); }

        .stats { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.2s, background-color 0.3s;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Buffer Message</h2>
        <textarea id="msgInput" placeholder="Initialize transmission..."></textarea>
        
        <div class="stats">
            <span id="charCount">0 / 140</span>
            <span id="percent">0%</span>
        </div>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('msgInput');
        const count = document.getElementById('charCount');
        const percent = document.getElementById('percent');
        const bar = document.getElementById('progress-bar');
        const LIMIT = 140;

        input.addEventListener('input', () => {
            const len = input.value.length;
            const p = Math.min((len / LIMIT) * 100, 100);
            
            count.innerText = `${len} / ${LIMIT}`;
            percent.innerText = `${Math.round(p)}%`;
            bar.style.width = `${p}%`;

            if (len >= LIMIT) {
                bar.style.backgroundColor = 'var(--danger)';
                input.style.borderColor = 'var(--danger)';
            } else {
                bar.style.backgroundColor = 'var(--primary)';
                input.style.borderColor = 'rgba(255,255,255,0.2)';
            }
        });
    </script>
</body>
</html>
