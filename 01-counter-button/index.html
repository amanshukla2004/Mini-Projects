<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://kit.fontawesome.com/8187e17f51.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- wrapper -->
  <div class="wrapper">
    <div class="heading">Increment and Decrement</div>

    <div class="box">
      <button class="btn left" onclick="decrement()">
        <i class="fa-solid fa-minus"></i>
      </button>

      <div class="counter">0</div>

      <button class="btn right" onclick="increment()">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>

    <button class="reset-btn" onclick="reset()">RESET</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
