<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Modern Flux Dashboard</title>
    <style>
        /* --- CSS STYLING --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            cursor: crosshair;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Glassmorphism HUD (Heads Up Display) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            pointer-events: auto; /* Allow clicking on controls */
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #4facfe;
        }

        #center-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            font-size: 4rem;
            letter-spacing: 10px;
            opacity: 0.1;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="center-title">FLUX</div>
    <div id="hud">
        <h1>Control Panel</h1>
        
        <div class="control-group">
            <label><span>Particle Count</span> <span id="val-count">1000</span></label>
            <input type="range" id="param-count" min="100" max="5000" value="1000">
        </div>

        <div class="control-group">
            <label><span>Mouse Magnetism</span> <span id="val-magnet">0.02</span></label>
            <input type="range" id="param-magnet" min="0.001" max="0.1" step="0.001" value="0.02">
        </div>

        <div class="control-group">
            <label><span>Orbit Speed</span> <span id="val-orbit">0.05</span></label>
            <input type="range" id="param-orbit" min="0" max="0.2" step="0.01" value="0.05">
        </div>
    </div>

    <div id="webgl-container"></div>

    <script>
        // --- 1. SETUP THREE.JS SCENE ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        // Add a very subtle dark blue fog to fade out distant particles
        scene.fog = new THREE.FogExp2(0x050505, 0.002); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 400;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Sharp on retina displays
        container.appendChild(renderer.domElement);

        // --- 2. CREATE GLOWING TEXTURE ---
        // Instead of loading an image, we draw a soft glowing circle using HTML Canvas
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        // --- 3. PARTICLE SYSTEM CONFIG ---
        let particles;
        let particleData = []; // Store physics data for each particle
        let MAX_PARTICLES = 5000;
        let currentCount = 1000;

        // Parameters tied to the UI
        const params = {
            magnetism: 0.02,
            orbit: 0.05
        };

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(MAX_PARTICLES * 3);
        const colors = new Float32Array(MAX_PARTICLES * 3);

        const colorPalette = [
            new THREE.Color(0x00f2fe), // Cyan
            new THREE.Color(0x4facfe), // Light Blue
            new THREE.Color(0x7f00ff), // Purple
            new THREE.Color(0xff1493)  // Deep Pink
        ];

        // Initialize particle data
        for (let i = 0; i < MAX_PARTICLES; i++) {
            // Random positions spread out
            const x = (Math.random() - 0.5) * 1000;
            const y = (Math.random() - 0.5) * 1000;
            const z = (Math.random() - 0.5) * 800; // Deep Z-axis!

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            // Pick a random color from palette
            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;

            // Physics data
            particleData.push({
                angle: Math.random() * Math.PI * 2,
                radius: Math.random() * 200 + 50, // Orbit radius
                speed: (Math.random() * 0.02) + 0.01,
                friction: Math.random() * 0.04 + 0.01 // Lerp friction
            });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        // Tells Three.js to only render 'currentCount' particles out of MAX_PARTICLES
        geometry.setDrawRange(0, currentCount); 

        // Material setup for the "Bloom/Glow" look
        const material = new THREE.PointsMaterial({
            size: 15, // Particle size
            map: createGlowTexture(),
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending, // Key to making them glow when they overlap!
            depthWrite: false // Prevents dark square artifacts around glowing transparent images
        });

        particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- 4. MOUSE TRACKING IN 3D SPACE ---
        const mouse = new THREE.Vector3(0, 0, 0);
        const target = new THREE.Vector3(0, 0, 0);

        window.addEventListener('mousemove', (event) => {
            // Convert screen coordinates to Normalized Device Coordinates (-1 to +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            mouse.z = 0.5;

            // Unproject into 3D world space
            target.copy(mouse).unproject(camera);
            target.sub(camera.position).normalize();
            // Project the point 400 units away from camera
            const distance = -camera.position.z / target.z;
            target.copy(camera.position).add(target.multiplyScalar(distance));
        });

        // --- 5. UI CONTROLS INTERACTION ---
        document.getElementById('param-count').addEventListener('input', (e) => {
            currentCount = parseInt(e.target.value);
            document.getElementById('val-count').innerText = currentCount;
            geometry.setDrawRange(0, currentCount); // Instantly show/hide particles
        });

        document.getElementById('param-magnet').addEventListener('input', (e) => {
            params.magnetism = parseFloat(e.target.value);
            document.getElementById('val-magnet').innerText = params.magnetism;
        });

        document.getElementById('param-orbit').addEventListener('input', (e) => {
            params.orbit = parseFloat(e.target.value);
            document.getElementById('val-orbit').innerText = params.orbit;
        });

        // --- 6. ANIMATION ENGINE ---
        function animate() {
            requestAnimationFrame(animate);

            const posAttribute = geometry.attributes.position;

            for (let i = 0; i < currentCount; i++) {
                const data = particleData[i];
                
                // Read current position
                let px = posAttribute.getX(i);
                let py = posAttribute.getY(i);
                let pz = posAttribute.getZ(i);

                // 1. Orbital Physics
                data.angle += data.speed * params.orbit;
                const orbitX = Math.cos(data.angle) * data.radius;
                const orbitY = Math.sin(data.angle) * data.radius;

                // 2. Combine Target + Orbit
                const targetX = target.x + orbitX;
                const targetY = target.y + orbitY;
                const targetZ = (Math.sin(data.angle * 2) * 100); // Gentle 3D wave

                // 3. LERP (Linear Interpolation) to move smoothly towards target
                // We use the slider's magnetism mixed with the particle's own friction
                const force = params.magnetism * data.friction * 10;
                
                px += (targetX - px) * force;
                py += (targetY - py) * force;
                pz += (targetZ - pz) * force;

                // Write new position back to buffer
                posAttribute.setXYZ(i, px, py, pz);
            }

            // Tell Three.js the positions have changed so it redraws them
            posAttribute.needsUpdate = true;

            // Slowly rotate the entire particle cloud for an extra 3D feel
            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005;

            renderer.render(scene, camera);
        }

        // --- 7. HANDLE RESIZING ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start the loop!
        animate();
    </script>
</body>
</html>
